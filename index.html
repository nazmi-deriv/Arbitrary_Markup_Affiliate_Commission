        function runCalculator() {
            const plan = document.getElementById('calc-plan').value;
            let result = 0;
            let summary = '';

            if (plan === 'rev') {
                const netRev = parseFloat(document.getElementById('calc-net-rev')?.value) || 0;
                const revPct = parseFloat(document.getElementById('calc-rev-pct')?.value) || 0;
                result = netRev * (revPct / 100);
                summary = `At a ${revPct}% revenue share rate, your estimated monthly commission is **$${result.toFixed(2)} USD**.`;
            } else if (plan === 'cpa') {
                const qty = parseInt(document.getElementById('calc-cpa-qty')?.value) || 0;
                result = qty * 100;
                summary = `For ${qty} qualified clients who deposited at least $100 and began trading, your one-time CPA payout totals **$${result.toFixed(2)} USD**.`;
            } else if (plan === 'master') {
                const subEarnings = parseFloat(document.getElementById('calc-master-sub')?.value) || 0;
                result = subEarnings * 0.20;
                summary = `Based on sub-partners earning a total of $${subEarnings.toFixed(2)}, your 20% Master Partner commission tier is **$${result.toFixed(2)} USD**.`;
            }

            const disp = document.getElementById('calc-result-display');
            if (disp) disp.innerText = `$${result.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            const sum = document.getElementById('calc-summary-text');
            if (sum) sum.innerHTML = summary;
        }

            },
            {
                q: "4. Which of these commissions are auto-credited by the BackOffice Commission Service (No Finance action required)?",
                options: [
                    "MyAffiliate (DSVG), Retrospective Commission",
                    "Affiliate V2, Partner Tier Reward, Partner Quarterly Bonus",
                    "Dynamic Work (DW), Retrospective Commission",
                    "All of the above"
                ],
                correct: 1
            },
            {
                q: "5. In the payment workflow, what is the very last step after a payment has been completed?",
                options: [
                    "Submit the accs_recon_partners workflow request",
                    "Notify the Marketing Team in both the email thread and the #partners_payment Slack channel",
                    "Delete the verified CSV files from the local environment",
                    "Wait for the next quarterly bonus period"
                ],
                correct: 1
            }
        ];

        let quizUserAnswers = Array(quizQuestions.length).fill(null);
        let quizSubmitted = false;

        function selectQuizOption(qIdx, optIdx) {
            if (quizSubmitted) return;
            quizUserAnswers[qIdx] = optIdx;
            renderQuiz();
        }

        function submitQuiz() {
            if (quizUserAnswers.includes(null)) {
                alert("Please answer all questions before submitting the quiz.");
                return;
            }
            quizSubmitted = true;
            renderQuiz();
        }

        function resetQuiz() {
            quizUserAnswers = Array(quizQuestions.length).fill(null);
            quizSubmitted = false;
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            if (!container) return;

            let score = 0;
            if (quizSubmitted) {
                score = quizUserAnswers.reduce((acc, ans, idx) => {
                    return ans === quizQuestions[idx].correct ? acc + 1 : acc;
                }, 0);
            }

            let html = '';

            if (quizSubmitted) {
                const passed = score >= 4;
                html += `
                    <div class="mb-6 p-5 rounded-2xl ${passed ? 'bg-emerald-50 border border-emerald-200 text-emerald-800' : 'bg-red-50 border border-red-200 text-red-800'} text-center">
                        <span class="text-3xl">${passed ? '🎉' : '❌'}</span>
                        <h3 class="text-xl font-bold mt-2">${passed ? 'Congratulations! You passed!' : 'Keep practicing!'}</h3>
                        <p class="text-xs mt-1">You scored <strong>${score} out of ${quizQuestions.length}</strong>.</p>
                        
                        ${passed ? `
                            <div class="mt-4 p-4 bg-white rounded-xl border border-emerald-100 shadow-sm inline-block max-w-sm text-center">
                                <div class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Handover Certificate Badge</div>
                                <h4 class="font-extrabold text-slate-900 text-sm mt-1">Partner Commission Specialist</h4>
                                <p class="text-[10px] text-slate-400 mt-0.5">Dual BackOffice Platforms Mastery Approved</p>
                            </div>
                        ` : ''}

                        <div class="mt-4 flex justify-center gap-3">
                            <button onclick="resetQuiz()" class="bg-slate-800 text-white font-bold text-xs px-4 py-2 rounded-lg hover:bg-slate-900">Try Again</button>
                        </div>
                    </div>
                `;
            }

            quizQuestions.forEach((q, qIdx) => {
                const isCorrect = quizUserAnswers[qIdx] === q.correct;
                html += `
                    <div class="mb-5 bg-white p-5 rounded-xl border border-slate-200">
                        <h4 class="font-bold text-slate-800 text-xs">${q.q}</h4>
                        <div class="space-y-2 mt-3">
                `;

                q.options.forEach((opt, optIdx) => {
                    let optStyle = 'border-slate-200 hover:bg-slate-50';
                    let badge = '';

                    if (quizUserAnswers[qIdx] === optIdx) {
                        optStyle = 'border-derivRed bg-red-50/10';
                    }

                    if (quizSubmitted) {
                        if (optIdx === q.correct) {
                            optStyle = 'border-emerald-500 bg-emerald-50/20';
                            badge = '<span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded ml-2">Correct Answer</span>';
                        } else if (quizUserAnswers[qIdx] === optIdx) {
                            optStyle = 'border-red-500 bg-red-50/30';
                            badge = '<span class="text-[10px] font-bold text-red-600 bg-red-50 px-1.5 py-0.5 rounded ml-2">Your Answer</span>';
                        }
                    }

                    html += `
                        <div onclick="selectQuizOption(${qIdx}, ${optIdx})" class="flex justify-between items-center p-3 rounded-lg border-2 text-xs cursor-pointer transition-all ${optStyle}">
                            <span>${opt}</span>
                            ${badge}
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            if (!quizSubmitted) {
                html += `
                    <div class="flex justify-end mt-4">
                        <button onclick="submitQuiz()" class="bg-derivRed text-white font-bold text-xs px-6 py-3 rounded-xl hover:bg-derivRedHover shadow-lg shadow-derivRed/25">Submit Answers</button>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Global Slide Navigation Engine
        function renderNav() {
            const list = document.getElementById('nav-list');
            list.innerHTML = slides.map((slide, idx) => {
                const isSelected = currentSlide === idx;
                const hasVisited = visitedSlides.has(idx);
                return `
                    <button onclick="goToSlide(${idx})" class="w-full text-left p-3 rounded-xl text-xs flex items-center justify-between transition-all group ${
                        isSelected ? 'bg-derivRed text-white font-semibold shadow-md shadow-derivRed/20' : 'text-slate-400 hover:bg-slate-800/60 hover:text-white'
                    }">
                        <div class="flex items-center gap-2.5 truncate">
                            <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${
                                isSelected ? 'bg-white text-derivRed' : (hasVisited ? 'bg-slate-700 text-derivRed' : 'bg-slate-800 text-slate-500')
                            }">
                                ${idx + 1}
                            </span>
                            <span class="truncate">${slide.title}</span>
                        </div>
                        ${hasVisited && !isSelected ? `
                            <svg class="w-3.5 h-3.5 text-derivRed" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                            </svg>
                        ` : ''}
                    </button>
                `;
            }).join('');

            // Update Progress Percentage
            const progressPct = Math.round((visitedSlides.size / slides.length) * 100);
            const textEl = document.getElementById('progress-text');
            if (textEl) textEl.innerText = `${progressPct}%`;
            const barEl = document.getElementById('progress-bar');
            if (barEl) barEl.style.width = `${progressPct}%`;
        }

        function goToSlide(idx) {
            currentSlide = idx;
            visitedSlides.add(idx);
            
            // Render basic UI items
            const currentNum = document.getElementById('current-slide-num');
            if (currentNum) currentNum.innerText = idx + 1;
            
            // Build viewport layout content
            const slide = slides[idx];
            const viewport = document.getElementById('slide-viewport');
            
            viewport.innerHTML = `
                <div class="flex flex-col flex-grow justify-between">
                    <div>
                        <!-- Slide Header details -->
                        <div class="flex justify-between items-start gap-4 mb-6 border-b border-gray-100 pb-4">
                            <div>
                                <span class="text-[10px] font-bold text-derivRed uppercase tracking-widest">${slide.category}</span>
                                <h2 class="text-2xl font-extrabold text-slate-900 mt-1">${slide.title}</h2>
                                <p class="text-xs text-slate-500 mt-0.5">${slide.subtitle}</p>
                            </div>
                            <span class="text-xs font-bold text-slate-300">#${idx + 1}</span>
                        </div>
                        <!-- Injected dynamic rendering content -->
                        <div class="slide-dynamic-body py-2">
                            ${slide.render()}
                        </div>
                    </div>
                </div>
            `;

            // Setup state dependent rendering triggers
            if (idx === 10) { // Slide index 10 is the dynamic calculator
                injectCalculatorInputs();
            } else if (idx === 14) { // Slide index 14 is the 13-Step Flow Process
                selectPipelineStep(1);
            } else if (idx === 20) { // Slide index 20 is the interactive quiz
                renderQuiz();
            }

            // Disable/Enable footer buttons
            const prevBtn = document.getElementById('prev-btn');
            if (prevBtn) prevBtn.disabled = idx === 0;
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                if (idx === slides.length - 1) {
                    nextBtn.innerHTML = `Finish Onboarding <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                } else {
                    nextBtn.innerHTML = `Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
                }
            }

            renderNav();
            
            // Smoothly scroll the stage up to the top of new slide content on load
            const stage = document.getElementById('slide-stage');
            if (stage) stage.scrollTop = 0;
            
            // On mobile, close sidebar after clicking
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth < 768 && sidebar && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                goToSlide(currentSlide + 1);
            } else {
                // Final onboarding finish trigger (Go to slide index 20 / Quiz)
                goToSlide(20);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                goToSlide(currentSlide - 1);
            }
        }

        // Sidebar responsive display toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && overlay) {
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            }
        }

        // Standard Launch setup trigger
        window.onload = function () {
            const totalEl = document.getElementById('total-slides-num');
            if (totalEl) totalEl.innerText = slides.length;
            goToSlide(0);
        };
    </script>
</body>
</html>
